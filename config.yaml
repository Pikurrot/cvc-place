version: 1.1.0
speed_factor: 0.04
zoom_sensitivity: 0.001
min_zoom: 0.05
max_zoom: 20
world_size: 5000
grid_step: 50
min_image_pct: 0.01
max_image_pct: 0.5
pen_size: 4
eraser_size: 4
starting_points: 1000
points_area_divisor: 25000
warning_duration: 5
admin_username: admin
# WhoIsIn presence: put the API shared secret in .env as CVC_PRESENCE_SECRET (recommended,
# not committed). Optional fallback: presence_worker_secret below. Not related to SSH. See docs/presence.md.
# presence_worker_secret: only-if-not-using-env
cvc_presence_interval_seconds: 900
# Optional: WhoIsIn page URL for admin debug (POST /api/admin/check-whoin). Not exposed on GET /api/config.
# The server process must be able to open this URL (same machine as tunnel/worker is typical). Or set WHOISIN_URL in the environment.
whoisin_url: http://127.0.0.1:8080/icarwac/whoIsIn.php
